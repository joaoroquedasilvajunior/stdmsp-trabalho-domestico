name: Deploy Casa Justa (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "casa-justa/**"
      - ".github/workflows/deploy-casa-justa.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: casa-justa
      - id: deployment
        uses: actions/deploy-pages@v4
